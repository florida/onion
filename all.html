<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>onion · all</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f5f5; }
    body { font-family: monospace; touch-action: none; -webkit-tap-highlight-color: transparent; }
    canvas { display: block; touch-action: none; }

    .picker {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 92vw;
    }
    .picker.bottom { bottom: 24px; }

    .view-tab {
      padding: 6px 14px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.45);
      border-radius: 999px;
      transition: all 0.18s ease;
      user-select: none;
    }
    .view-tab:hover { color: rgba(0, 0, 0, 0.8); }
    .view-tab.active {
      color: rgba(0, 0, 0, 0.85);
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .hint {
      position: fixed;
      right: 24px;
      bottom: 24px;
      font-size: 10px;
      color: rgba(0, 0, 0, 0.4);
      letter-spacing: 0.08em;
      z-index: 10;
      pointer-events: none;
    }

    .corner-nav {
      position: fixed;
      left: 24px;
      bottom: 24px;
      display: flex;
      gap: 14px;
      z-index: 10;
    }
    .corner-nav a {
      font-size: 10px;
      color: rgba(0, 0, 0, 0.45);
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: color 0.18s ease;
    }
    .corner-nav a:hover { color: rgba(0, 0, 0, 0.85); }
    .corner-nav a.active { color: rgba(0, 0, 0, 0.85); font-weight: bold; }

    @media (max-width: 768px) {
      .view-tab { padding: 9px 14px; font-size: 12px; letter-spacing: 0.02em; white-space: nowrap; }
      .picker.bottom { bottom: 18px; gap: 8px; flex-wrap: nowrap; }
      .hint { display: none; }
      .corner-nav {
        left: 16px;
        bottom: 90px;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
      .corner-nav a { font-size: 13px; padding: 6px 4px; }
      .corner-nav a.active { display: none; }
    }
  </style>
</head>
<body>
  <div class="picker bottom" id="view-picker"></div>
  <div class="hint">↑ ↓ views</div>
  <nav class="corner-nav">
    <a href="index.html">onion</a>
    <a href="constellation.html">constellation</a>
    <a href="flower.html">flower</a>
    <a href="all.html" class="active">all</a>
  </nav>
  <script src="seed_data.js?v=23"></script>
  <script src="sketch_all.js?v=23"></script>
</body>
</html>
